name: Deploy FoodFlow Application

on: 
  push:
    branches:
      - refactor-folder-structure-by-role

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}     
      - name: Build Docker Image
        run: docker build -t youness479/food-flow-back  .
      - name: Publish Image to docker hub
        run: docker push youness479/food-flow-back:latest 
 
  deploy:
    needs: build
    runs-on: self-hosted 
    steps:
      - name: Pull image from docker hub
        run: docker pull youness479/food-flow-back:latest 
      - name: Delete old container
        run: docker rm -f nodejs-app-container  
      - name: Run Docker Container
        run: docker run -d -p 3005:3005 --name nodejs-app-container  youness479/food-flow-back