
name: CI/CD Pipeline

on:
  push:
    branches:
      - refactor-folder-structure-by-role

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v3

      # Set up Docker Buildx
        steps:
      - name: Checkout Source
        uses: actions/checkout@v4
      - name: Login to docker hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}     
      - name: Build Docker Image
        run: docker build -t youness479/food-flow-back  .
      - name: Publish Image to docker hub
        run: docker push youness479/food-flow-back:latest 

      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            docker stop scene_stream_backend || true
            docker rm scene_stream_backend || true
            docker pull youness479/food-flow-back:latest
            docker run -d \
              --name scene_stream_backend \
              -p 5000:5000 \
              --env-file ./food-flow_back/.env \
              youness479/food-flow-back:latest