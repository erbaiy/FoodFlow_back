name: CI/CD Pipeline

on:
  push:
    branches:
      - refactor-folder-structure-by-role

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # Checkout the code
      - name: Checkout repository
        uses: actions/checkout@v4
      
      # Set up Node.js environment (if your project uses Node.js)
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your Node.js version
      
      # Install dependencies
      - name: Install dependencies
        run: npm install
      
      # Run tests
      - name: Run tests
        run: npm test # Replace with your test command if different
      
      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      
      # Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      # Build and push Docker image
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: youness479/food-flow-back:latest
      
      # Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/app
            docker stop food_flow_backend || true
            docker rm food_flow_backend || true
            docker pull youness479/food-flow-back:latest
            docker run -d \
              --name food_flow_backend \
              -p 3005:3005 \
              --env-file ./food-flow_back/.env \
              youness479/food-flow-back:latest